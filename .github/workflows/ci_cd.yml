name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── 1. TESTS ─────────────────────────────────────────────────────
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  # ─── 2. DOCKER BUILD & PUSH ───────────────────────────────────────
  docker:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: test                          # ← ne tourne que si les tests passent
    if: github.ref == 'refs/heads/main'  # ← seulement sur main

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mini-search-api:latest

      - name: Build & push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mini-search-ui:latest

  # ─── 3. DEPLOY ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger API deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger UI deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_UI }}"